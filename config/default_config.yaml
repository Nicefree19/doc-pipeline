# FileHub - File Management Hub v0.1
# Default Configuration

# 감시 대상 디렉토리
watcher:
  paths:
    - "~/Downloads"
    - "~/Documents"
  recursive: true
  use_polling: false
  poll_interval: 2.0

# 명명 규칙 정규식
# 형식: YYYYMMDD_PCODE_설명_vNN
naming_pattern: "^(?P<date>\\d{8})_(?P<pcode>[A-Z]{1,3}\\d{2,6})_(?P<desc>[A-Za-z0-9가-힣]+(?:-[A-Za-z0-9가-힣]+)*)_v(?P<ver>\\d{2})"

# ISO 19650 설정 (전문 검증 엔진)
iso19650:
  enabled: true
  project: ["PRJ"]
  originator: ["ABC", "XYZ"]
  volume: ["ZZ"]
  level: ["00", "01", "02"]
  type: ["DR", "RP"]
  role: ["A", "S", "M"]
  number_pattern: "^\\d{4}$"
  type_help:
    DR: "도면"
    RP: "보고서"

# 무시 설정
ignore:
  prefixes:
    - "~$"
    - "."
    - "__"
  extensions:
    - ".tmp"
    - ".temp"
    - ".partial"
    - ".crdownload"
    - ".part"
    - ".download"
    - ".lnk"
    - ".ini"
    - ".db"
    - ".db-journal"
    - ".log"
  globs:
    - "**/desktop.ini"
    - "**/Thumbs.db"
    - "**/.DS_Store"

# 파이프라인 설정 (Spec Freeze)
pipeline:
  debounce_seconds: 1.0          # 디바운스: 1초
  stability_timeout: 20.0        # 안정성 타임아웃: 20초
  stability_interval: 0.5        # 안정성 체크 간격: 0.5초
  stability_rounds: 2            # 안정성 체크 라운드: 2회
  cooldown_seconds: 1800.0       # 쿨다운: 30분 (1800초)

# 알림 설정
notification:
  enabled: true
  title: "FileHub"
  duration: 10

# 로깅 설정
logging:
  level: INFO
  max_size_mb: 5                 # 5MB
  backup_count: 5

